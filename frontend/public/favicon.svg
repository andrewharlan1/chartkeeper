<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140" role="img" aria-label="Scorva">
  <title>Scorva</title>
  <desc>SA monogram on a dark tile, simplified for small sizes</desc>
  <rect x="20" y="20" width="120" height="100" rx="14" fill="#0e1a2b"/>
  <g stroke="#f5f2ec" stroke-width="0.8" opacity="0.22">
    <line x1="20" y1="54" x2="140" y2="54"/>
    <line x1="20" y1="65" x2="140" y2="65"/>
    <line x1="20" y1="76" x2="140" y2="76"/>
    <line x1="20" y1="87" x2="140" y2="87"/>
    <line x1="20" y1="98" x2="140" y2="98"/>
  </g>
  <text x="44" y="92" font-family="Fraunces, 'Iowan Old Style', Georgia, serif" font-size="56" font-weight="500" font-style="italic" fill="#f5f2ec" letter-spacing="-1">S</text>
  <text x="84" y="92" font-family="Fraunces, 'Iowan Old Style', Georgia, serif" font-size="56" font-weight="500" font-style="italic" fill="#c8531c" letter-spacing="-1">A</text>
</svg>
